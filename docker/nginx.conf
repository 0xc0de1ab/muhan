# Muhan MUD Web UI - Nginx Configuration
# SPA(Single Page Application) + WebSocket 프록시

server {
    listen 80;
    server_name _;

    # Vue.js SPA 정적 파일 서빙
    root /usr/share/nginx/html;
    index index.html;

    # Gzip 압축
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # ===== 보안 헤더 (S7) =====
    # 클릭재킹 방지: 같은 origin에서만 iframe 허용
    add_header X-Frame-Options "SAMEORIGIN" always;
    # MIME 스니핑 방지
    add_header X-Content-Type-Options "nosniff" always;
    # XSS 필터 활성화
    add_header X-XSS-Protection "1; mode=block" always;
    # Referrer 정책: cross-origin 시 origin만 전송
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Content Security Policy: 허용된 소스만 로드
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' ws: wss:;" always;

    # 정적 자산 캐싱 (Vite 빌드 해시 포함 파일)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # WebSocket 프록시 - 웹 클라이언트가 Nginx를 통해 게임 서버에 연결
    # 클라이언트는 ws://domain/ws 로 접속
    location /ws {
        proxy_pass http://muhan:4041;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 타임아웃 (MUD 세션은 장시간 유지)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # SPA 라우팅 fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}

