# =============================================================================
#  [02] Bump up — VERSION 파일 버전 업데이트
#
#  수동 트리거 전용. patch / minor / major 중 선택.
#  VERSION 파일을 업데이트하고 커밋합니다.
# =============================================================================

name: "[02] Bump up"

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "버전 업 유형"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  bump:
    name: Bump Version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bump VERSION
        id: bump
        run: |
          CURRENT=$(cat VERSION | tr -d '[:space:]')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "$NEW" > VERSION
          echo "old=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "new=${NEW}" >> "$GITHUB_OUTPUT"
          echo "Bumped: ${CURRENT} → ${NEW} (${{ inputs.bump }})"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "release: bump version ${{ steps.bump.outputs.old }} → ${{ steps.bump.outputs.new }}"
          git push origin main
