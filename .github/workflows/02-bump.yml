# =============================================================================
#  [02] Bump up — VERSION 파일 버전 업데이트
#
#  버전 형식: major.minor.rev-YYYYMM.seq
#  - 상위 버전 변경 시 하위 버전 리셋 (minor, rev → 0, YYYYMM → 현재, seq → 자동)
#  - seq: 동일 canonical 버전(major.minor.rev-YYYYMM)의 이전 태그가 있으면 +1, 없으면 1
# =============================================================================

name: "[02] Bump up"

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "버전 업 유형"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - custom
      custom_version:
        description: "직접 지정할 버전 (bump_type=custom 시 필수, 예: 1.0.0-202606.1)"
        required: false
        type: string
      set_major:
        description: "major 값 직접 지정 (비어있으면 현재값 유지, bump_type=custom 시 무시)"
        required: false
        type: string
      set_minor:
        description: "minor 값 직접 지정 (비어있으면 현재값 유지, bump_type=custom 시 무시)"
        required: false
        type: string
      set_rev:
        description: "rev 값 직접 지정 (비어있으면 현재값 유지, bump_type=custom 시 무시)"
        required: false
        type: string
      trigger_release:
        description: "버전 업 후 [03] Release 를 자동 실행"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

jobs:
  bump:
    name: Bump Version
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Bump VERSION
        id: bump
        run: |
          set -e
          CURRENT=$(cat VERSION | tr -d '[:space:]')
          echo "Current version: ${CURRENT}"

          if [ "${{ inputs.bump_type }}" = "custom" ]; then
            if [ -z "${{ inputs.custom_version }}" ]; then
              echo "::error::custom_version is required when bump_type=custom"
              exit 1
            fi
            NEW_VERSION="${{ inputs.custom_version }}"
          else
            # Parse current: major.minor.rev-YYYYMM.seq
            CANONICAL=$(echo "$CURRENT" | cut -d'-' -f1)
            CURRENT_MAJOR=$(echo "$CANONICAL" | cut -d'.' -f1)
            CURRENT_MINOR=$(echo "$CANONICAL" | cut -d'.' -f2)
            CURRENT_REV=$(echo "$CANONICAL" | cut -d'.' -f3)

            TARGET_MAJOR=$CURRENT_MAJOR
            TARGET_MINOR=$CURRENT_MINOR
            TARGET_REV=$CURRENT_REV

            # Apply bump increment
            case "${{ inputs.bump_type }}" in
              major) TARGET_MAJOR=$((CURRENT_MAJOR + 1)) ;;
              minor) TARGET_MINOR=$((CURRENT_MINOR + 1)) ;;
              patch) TARGET_REV=$((CURRENT_REV + 1)) ;;
            esac

            # Track explicit override inputs
            SET_MAJOR_VAL="${{ inputs.set_major }}"
            SET_MINOR_VAL="${{ inputs.set_minor }}"
            SET_REV_VAL="${{ inputs.set_rev }}"

            # Apply overrides if provided
            if [ -n "$SET_MAJOR_VAL" ]; then
              TARGET_MAJOR="$SET_MAJOR_VAL"
            fi
            if [ -n "$SET_MINOR_VAL" ]; then
              TARGET_MINOR="$SET_MINOR_VAL"
            fi
            if [ -n "$SET_REV_VAL" ]; then
              TARGET_REV="$SET_REV_VAL"
            fi

            # Reset logic:
            # 1. If major has changed, reset minor and rev to 0 (unless explicitly overridden)
            if [ "$TARGET_MAJOR" != "$CURRENT_MAJOR" ]; then
              if [ -z "$SET_MINOR_VAL" ]; then
                TARGET_MINOR=0
              fi
              if [ -z "$SET_REV_VAL" ]; then
                TARGET_REV=0
              fi
            fi

            # 2. If minor has changed (including due to reset), reset rev to 0 (unless explicitly overridden)
            if [ "$TARGET_MINOR" != "$CURRENT_MINOR" ]; then
              if [ -z "$SET_REV_VAL" ]; then
                TARGET_REV=0
              fi
            fi

            NEW_CANONICAL="${TARGET_MAJOR}.${TARGET_MINOR}.${TARGET_REV}"
            NEW_YYYYMM=$(date -u '+%Y%m')

            # Compute seq: find previous tags with same canonical-YYYYMM prefix
            MAX_SEQ=0
            PREFIX="v${NEW_CANONICAL}-${NEW_YYYYMM}."
            for tag in $(git tag -l "${PREFIX}*" 2>/dev/null); do
              TAG_SEQ=$(echo "$tag" | sed "s|${PREFIX}||")
              if echo "$TAG_SEQ" | grep -qE '^[0-9]+$'; then
                if [ "$TAG_SEQ" -gt "$MAX_SEQ" ]; then
                  MAX_SEQ=$TAG_SEQ
                fi
              fi
            done
            NEW_SEQ=$((MAX_SEQ + 1))

            NEW_VERSION="${NEW_CANONICAL}-${NEW_YYYYMM}.${NEW_SEQ}"
          fi

          echo "${NEW_VERSION}" > VERSION
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "old_version=${CURRENT}" >> "$GITHUB_OUTPUT"

          # Job summary
          {
            echo "## 🔖 Version Bump"
            echo ""
            echo "| | 값 |"
            echo "|---|---|"
            echo "| **이전 버전** | \`${CURRENT}\` |"
            echo "| **새 버전** | \`${NEW_VERSION}\` |"
            echo "| **Bump 유형** | ${{ inputs.bump_type }} |"
            echo "| **Release 연계** | ${{ inputs.trigger_release }} |"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "Bumped: ${CURRENT} → ${NEW_VERSION}"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "release: bump version → ${{ steps.bump.outputs.new_version }}"
          git push origin main

  trigger-release:
    name: Trigger Release
    needs: [bump]
    if: inputs.trigger_release == true
    runs-on: ubuntu-latest
    steps:
      - name: Trigger [03] Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run "03-release.yml" --repo "${{ github.repository }}"
          echo "✅ [03] Release triggered for v${{ needs.bump.outputs.new_version }}"
