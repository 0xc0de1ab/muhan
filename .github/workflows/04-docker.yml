# =============================================================================
#  [04] Build Docker Image — Docker 빌드 및 레지스트리 푸시
#
#  트리거:
#    - main push 시 자동 (Build 성공 후)
#    - 수동 트리거
#
#  두 레지스트리에 동시 푸시:
#    1. GHCR (ghcr.io) — GitHub Container Registry
#    2. OCI  — 자체 OCI Registry (Secret 설정 시)
# =============================================================================

name: "[04] Build Docker Image"

on:
  workflow_run:
    workflows: ["[01] Build"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Build & Push
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read VERSION
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BUILD_DATE=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "build_date=${BUILD_DATE}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}, SHA: ${SHORT_SHA}, Date: ${BUILD_DATE}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ─── GHCR 로그인 ───
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ─── OCI Registry 로그인 (Secret 설정 시에만) ───
      - name: Login to OCI Registry
        if: env.OCI_REGISTRY != ''
        uses: docker/login-action@v3
        env:
          OCI_REGISTRY: ${{ secrets.OCI_REGISTRY }}
        with:
          registry: ${{ secrets.OCI_REGISTRY }}
          username: ${{ secrets.OCI_REGISTRY_USER }}
          password: ${{ secrets.OCI_REGISTRY_PASSWORD }}

      - name: Compute image list
        id: images
        env:
          OCI_REGISTRY: ${{ secrets.OCI_REGISTRY }}
        run: |
          IMAGES="ghcr.io/${{ github.repository }}"
          if [ -n "$OCI_REGISTRY" ]; then
            IMAGES="${IMAGES}
          ${OCI_REGISTRY}/muhan"
          fi
          echo "list<<EOF" >> "$GITHUB_OUTPUT"
          echo "$IMAGES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.images.outputs.list }}
          tags: |
            type=raw,value=v${{ steps.version.outputs.version }}
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            COMMIT=${{ steps.version.outputs.short_sha }}
            BUILD_DATE=${{ steps.version.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
