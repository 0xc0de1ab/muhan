# =============================================================================
#  [03] Release — Git Tag + GitHub Release + 릴리즈 바이너리
#
#  VERSION 파일의 현재 버전으로 태그와 릴리즈를 생성합니다.
#  릴리즈 노트는 이전 태그 이후 커밋을 요약하여 자동 생성합니다.
# =============================================================================

name: "[03] Release"

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  GO_VERSION: "1.25.0"

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read VERSION
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Release: ${TAG}"

      - name: Check tag does not exist
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "::error::Tag v${{ steps.version.outputs.version }} already exists. Run [02] Bump up first."
            exit 1
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build release binary
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          COMMIT=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.buildDate=${BUILD_DATE}" \
            -o muhan-server-linux-amd64 \
            ./cmd/muhan-server/

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          {
            echo "body<<RELEASE_EOF"
            echo "## 무한 서버 v${VERSION}"
            echo ""

            # Categorized changes
            if [ -n "$PREV_TAG" ]; then
              echo "### 변경 사항 (${PREV_TAG} 이후)"
              echo ""

              # Features
              FEATS=$(git log ${PREV_TAG}..HEAD --oneline --no-merges --grep="^feat" 2>/dev/null || true)
              if [ -n "$FEATS" ]; then
                echo "#### ✨ 새 기능"
                echo "$FEATS" | while read -r line; do echo "- $line"; done
                echo ""
              fi

              # Fixes
              FIXES=$(git log ${PREV_TAG}..HEAD --oneline --no-merges --grep="^fix" 2>/dev/null || true)
              if [ -n "$FIXES" ]; then
                echo "#### 🐛 버그 수정"
                echo "$FIXES" | while read -r line; do echo "- $line"; done
                echo ""
              fi

              # Others
              OTHERS=$(git log ${PREV_TAG}..HEAD --oneline --no-merges --invert-grep --grep="^feat" --grep="^fix" 2>/dev/null | head -20 || true)
              if [ -n "$OTHERS" ]; then
                echo "#### 📦 기타"
                echo "$OTHERS" | while read -r line; do echo "- $line"; done
                echo ""
              fi
            else
              echo "### 최근 커밋"
              echo ""
              git log --oneline --no-merges -20 | while read -r line; do echo "- $line"; done
              echo ""
            fi

            echo "### 🐳 Docker"
            echo ""
            echo '```bash'
            echo "docker pull ghcr.io/${{ github.repository }}:v${VERSION}"
            echo '```'
            echo ""
            echo "---"
            echo "_Built from commit $(git rev-parse --short HEAD) at $(date -u '+%Y-%m-%d %H:%M UTC')_"
            echo "RELEASE_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Git Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes "${{ steps.notes.outputs.body }}" \
            muhan-server-linux-amd64

      - name: Job Summary
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          {
            echo "## 🚀 Release v${VERSION}"
            echo ""
            echo "| | 값 |"
            echo "|---|---|"
            echo "| **버전** | \`v${VERSION}\` |"
            echo "| **태그** | \`${{ steps.version.outputs.tag }}\` |"
            echo "| **커밋** | \`$(git rev-parse --short HEAD)\` |"
            echo "| **바이너리** | \`muhan-server-linux-amd64\` |"
            echo ""
            echo "GitHub Release: https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.tag }}"
          } >> "$GITHUB_STEP_SUMMARY"
