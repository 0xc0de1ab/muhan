# =============================================================================
#  [01] Build — Lint, Test, Build
#
#  트리거: push, pull_request, 수동
# =============================================================================

name: "[01] Build"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

env:
  GO_VERSION: "1.25.0"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: go vet ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run tests
        run: go test ./... -timeout 300s -v > test.log 2>&1 || (cat test.log && exit 1)
      - name: Create Issue on Failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo '```' > body.txt
          head -n 200 test.log >> body.txt
          echo '=== FAIL/PANIC ===' >> body.txt
          grep -E "FAIL|panic" test.log >> body.txt || true
          tail -n 100 test.log >> body.txt
          echo '```' >> body.txt
          gh issue create --title "CI Test Failure Log" --body-file body.txt || true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: go build ./cmd/muhan-server/
