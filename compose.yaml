services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${MUHAN_POSTGRES_DB:-muhan}
      POSTGRES_USER: ${MUHAN_POSTGRES_USER:-muhan}
      POSTGRES_PASSWORD: ${MUHAN_POSTGRES_PASSWORD:-muhan_dev_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "127.0.0.1:${MUHAN_POSTGRES_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
